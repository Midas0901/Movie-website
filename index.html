<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Titans | Cinematic Market Analysis 2010-2025</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow-x: hidden; 
        }
        h1, h2, h3 { 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }
        
        .hero-gradient { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); 
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .accent-gold { color: #eab308; }
        .bg-gold { background-color: #eab308; }

        .observablehq--inspect { display: none; }
        .viz-container { 
            min-height: 500px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 1rem; 
        }

        /* ====================== FIX TOOLTIP สำหรับ GitHub Pages ====================== */
        
        /* กล่อง tooltip เป็นสีขาว */
        g[aria-label="tip"] rect {
            fill: #ffffff !important;
            stroke: #cbd5e1 !important;
        }

        /* ตัวอักษรใน tooltip เป็นสีดำ (สำคัญมาก) */
        g[aria-label="tip"] text,
        g[aria-label="tip"] tspan {
            fill: #000000 !important;
            color: #000000 !important;
            font-weight: 600 !important;
        }

        /* ป้องกันไม่ให้ตัวอักษรกลายเป็นสีขาว */
        g[aria-label="tip"] * {
            fill: #000000 !important;
        }

        /* สำหรับกรณีที่ Observable ใช้ class อื่น */
        .plot-tooltip text,
        .observablehq-tooltip text,
        div[role="tooltip"] text {
            fill: #000000 !important;
            color: #000000 !important;
        }

        /* ตัวอักษรแกนกราฟยังคงเป็นสีขาว */
        .observablehq svg text:not(g[aria-label="tip"] text) {
            fill: #f8fafc !important;
        }

        /* เพิ่มความแรงให้กับ tooltip */
        g[aria-label="tip"] {
            filter: none !important;
        }
    </style>
</head>
<body class="leading-relaxed">

    <nav class="fixed w-full z-50 bg-[#020617]/80 backdrop-blur-md border-b border-slate-800 p-5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-bold tracking-tighter italic text-white uppercase">STUDIO<span class="accent-gold text-2xl">TITANS</span></div>
            <div class="hidden md:flex space-x-10 text-sm font-semibold uppercase tracking-widest">
                <a href="#hero" class="hover:text-yellow-500 transition">Home</a>
                <a href="#comparison" class="hover:text-yellow-500 transition">Market Share</a>
                <a href="#deepdive" class="hover:text-yellow-500 transition">Analysis</a>
            </div>
        </div>
    </nav>

    <header id="hero" class="hero-gradient min-h-screen flex flex-col justify-center items-center px-6 text-center pt-20">
        <div data-aos="fade-up">
            <span class="text-yellow-500 font-bold tracking-[0.3em] text-sm mb-4 block uppercase">Market Intelligence Report</span>
            <h1 class="text-6xl md:text-8xl font-bold mb-6 leading-none">THE TRIAD OF <br><span class="accent-gold">MODERN CINEMA</span></h1>
            <p class="max-w-2xl text-slate-400 text-lg md:text-xl mb-10 mx-auto">
                A definitive data comparison between <strong>Marvel</strong>, <strong>DC</strong>, and <strong>Pixar</strong>.
            </p>
            <a href="#comparison" class="bg-gold text-black px-10 py-4 font-bold rounded-full hover:scale-105 transition transform inline-block">
                EXPLORE THE DATA
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 space-y-32 py-20">
        <section id="comparison">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-bold mb-4">Financial Trajectory</h2>
            </div>
            <div class="glass-card p-8 rounded-3xl">
                <div id="obs-revenue" class="viz-container"></div>
            </div>
        </section>

        <section id="deepdive">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-bold mb-4">Critical Reception</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="accent-gold mb-4 font-bold text-xl uppercase">Studio Comparison</h3>
                    <div id="obs-studio" class="viz-container" style="min-height: 400px;"></div>
                </div>
                <div class="space-y-6">
                    <h3 class="text-3xl font-bold uppercase">Key Findings</h3>
                    <p class="text-slate-400 text-lg">
                        Box office revenue vs Critical response analysis.
                    </p>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import {Runtime, Inspector} from "https://cdn.jsdelivr.net/npm/@observablehq/runtime@5/dist/runtime.js";
        import define from "https://api.observablehq.com/d/f8f3b538e8400abb.js?v=4";

        AOS.init({ once: true, duration: 800 });

        const runtime = new Runtime();
        runtime.module(define, name => {
            if (name === "revenueTrendChart") return new Inspector(document.querySelector("#obs-revenue"));
            if (name === "studioComparisonChart") return new Inspector(document.querySelector("#obs-studio"));
        });
    </script>
</body>
</html>
